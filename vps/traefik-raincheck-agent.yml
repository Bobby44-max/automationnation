http:
  routers:
    raincheck-agent:
      rule: "Host(`n8n.srv1021380.hstgr.cloud`) && PathPrefix(`/raincheck`)"
      priority: 200
      entryPoints:
        - websecure
      service: raincheck-agent-svc
      tls:
        certResolver: mytlschallenge
  services:
    raincheck-agent-svc:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:3848"
