# ─────────────────────────────────────────────────────
# Traefik Reverse Proxy Configuration (Component 3)
# ─────────────────────────────────────────────────────
# Forwards HTTPS POST requests from Port 443 to the
# internal Node.js Agent Server on Port 3847.
#
# Deploy on VPS alongside agent-server.js
# ─────────────────────────────────────────────────────

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  myresolver:
    acme:
      email: admin@example.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

http:
  routers:
    agent-router:
      rule: "Host(`agent.internal.system`)"
      service: agent-service
      entryPoints:
        - websecure
      tls:
        certResolver: myresolver

  services:
    agent-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3847"
